<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map · Lawrenceville Woods</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --forest: #1a3a1a; --fern: #4a7c3f; --sage: #7aaa6a; --mist: #c8dfc0; --cream: #f4f0e6; --gold: #c8a84b; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--forest); color: var(--cream); font-family: 'Crimson Pro', Georgia, serif; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(26,58,26,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(200,223,192,0.15); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--mist); text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { color: var(--mist); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 400; transition: color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }

  .page-header { padding: 8rem 4rem 3rem; text-align: center; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--sage); margin-bottom: 1rem; font-weight: 500; display: block; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); color: var(--cream); }

  .map-container { margin: 0 2rem 1.5rem; border: 1px solid rgba(200,223,192,0.15); overflow: hidden; height: 75vh; }
  .map-container iframe { width: 100%; height: 100%; border: none; }

  .map-legend { display: flex; justify-content: center; gap: 2.5rem; padding: 1.5rem 4rem 3rem; flex-wrap: wrap; border-top: 1px solid rgba(200,223,192,0.08); }
  .legend-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; color: rgba(200,223,192,0.6); letter-spacing: 0.05em; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  footer { background: #0d1a0d; padding: 2.5rem 4rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(200,223,192,0.08); }
  .footer-logo { font-family: 'Playfair Display', serif; color: rgba(200,223,192,0.6); font-size: 1rem; }
  .footer-text { color: rgba(200,223,192,0.35); font-size: 0.85rem; font-weight: 300; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Lawrenceville Woods</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="map.html" class="active">Map</a></li>
    <li><a href="trails.html">Trails</a></li>
    <li><a href="trees.html">Tree Species</a></li>
  </ul>
</nav>

<div class="page-header">
  <span class="section-label">Interactive Map</span>
  <h1>Explore the Woods</h1>
</div>

<div class="map-container">
  <iframe src="school_woods_map.html"></iframe>
</div>

<div class="map-legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2196F3"></div> Bowl Woods</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9C27B0"></div> Zen Woods</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FF5722"></div> Ropes Course Woods</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F44336"></div> Hamil Woods</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div> Meadow Woods</div>
</div>

<footer>
  <div class="footer-logo">Lawrenceville Woods</div>
  <div class="footer-text">The Lawrenceville School &nbsp;·&nbsp; New Jersey</div>
</footer>
</body>
</html>
